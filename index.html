<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanchal - Developer Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background-color: rgb(0, 0, 33);
            color: white;
            font-family: "Open Sans", sans-serif;
        }
        nav {
            background-color: rgb(0, 0, 67);
            display: flex;
            justify-content: space-around;
            height: 60px;
            align-items: center;
        }

        nav ul {

            display: flex;
            justify-content: center;

        }

        nav ul li {
            list-style: none;
            margin: 0px 23px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
        }

        nav ul li a:hover {
            color: blueviolet;
            font-size: 1.02rem;
        }

        .left {
            font-size: 1.5rem;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 60px 0px;

        }

        .firstSection>div {
            width: 30%;
        }

        .leftSection {
            font-size: 2.2rem;

        }

        .rightSection {
            border-radius: 205px;
            overflow: hidden;

        }

        .rightSection img {
            width: 100%;
            height: 100%;

        }

        .purple {
            color: blueviolet;
        }
        #element {
            color: blueviolet;
        }
        .secondSection{
            max-width: 80vw;
            margin: auto;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="left">Chanchal's Portfolio</div>
            <div class="right">

            </div>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Services</a></li>
                <li><a href="/">Projects</a></li>
                <li><a href="/">Contact Me</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="firstSection">
            <div class="leftSection">Hi My name is <span class="purple">Chanchal</span>
                <div>and i am a passionate</div>
                <span id="element"></span>
            </div>
            <div class="rightSection">
                <img src="pic1.png" alt="">
            </div>
        </section>
        <section class="secondSection">
          <h2>Past Experience</h2>
        </section>
    </main>
    <!-- type.js github CDN -->
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('#element', {
            strings: ['Software Engineer','MERN stack Developer','Full stack Developer'],
            typeSpeed: 50,
        });
    </script>
</body>

</html>
